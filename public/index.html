<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShiftForge</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">⚒</span>
        <div>
          <h1>ShiftForge</h1>
          <p class="subtitle">Shift scheduling and incident handover dashboard</p>
        </div>
      </div>
    </header>

    <div id="toast" class="toast" hidden></div>

    <section class="summary" aria-label="Operations summary">
      <div class="metric"><span class="metric-value" id="m-total-shifts">–</span><span class="metric-label">Total shifts</span></div>
      <div class="metric"><span class="metric-value" id="m-planned">–</span><span class="metric-label">Planned</span></div>
      <div class="metric"><span class="metric-value" id="m-active">–</span><span class="metric-label">Active</span></div>
      <div class="metric"><span class="metric-value" id="m-completed">–</span><span class="metric-label">Completed</span></div>
      <div class="metric"><span class="metric-value" id="m-open-incidents">–</span><span class="metric-label">Open incidents</span></div>
      <div class="metric metric-danger"><span class="metric-value" id="m-critical">–</span><span class="metric-label">Critical open</span></div>
      <div class="metric metric-wide"><span class="metric-value" id="m-busiest">–</span><span class="metric-label">Busiest shift</span></div>
    </section>

    <main class="layout">
      <div class="column">
        <section class="panel">
          <div class="panel-head">
            <h2>Shifts</h2>
            <button class="btn btn-ghost" id="refresh-btn" type="button">Refresh</button>
          </div>
          <div id="shift-list" class="shift-list"></div>
        </section>

        <section class="panel">
          <div class="panel-head"><h2>Create shift</h2></div>
          <form id="create-shift-form" class="form">
            <label>Title<input type="text" name="title" placeholder="Morning Support Shift" required /></label>
            <div class="form-row">
              <label>Date<input type="date" name="date" required /></label>
              <label>Start<input type="time" name="startTime" required /></label>
              <label>End<input type="time" name="endTime" required /></label>
            </div>
            <fieldset class="employee-picker">
              <legend>Assign employees (active only)</legend>
              <div id="employee-checkboxes" class="checkbox-grid"></div>
            </fieldset>
            <label>Handover notes<textarea name="handoverNotes" rows="2" placeholder="Optional"></textarea></label>
            <button class="btn btn-primary" type="submit">Create shift</button>
          </form>
        </section>
      </div>

      <div class="column">
        <section class="panel" id="detail-panel">
          <div id="detail-empty" class="empty-state">Select a shift to see its details and incidents.</div>
          <div id="detail-content" hidden></div>
        </section>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
